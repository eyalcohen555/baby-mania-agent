# ─────────────────────────────────────────────────────────────────────────────
# BabyMania Team Lead — Agent Output Contracts
#
# Binding schema for every agent's output.
# Orchestrator validates each stage output BEFORE passing to the next stage.
# Contract violation → stage fails → pipeline stops (no silent fallthrough).
# ─────────────────────────────────────────────────────────────────────────────

# ── Stage 1: Analyzer ─────────────────────────────────────────────────────────
analyzer:
  output_format: yaml_code_block       # must be inside ```yaml ... ```
  required_fields:
    product_id:            { type: string, not_empty: true }
    product_handle:        { type: string, not_empty: true }
    product_title:         { type: string, not_empty: true }
    product_type:          { type: string, not_empty: false }   # can be empty
    product_template_type: { type: enum, values: [clothing, shoes, accessories], not_empty: true }
    fabric_type:           { type: string, not_empty: false }   # can be empty
    target_age:            { type: string, not_empty: false }   # can be empty
    main_use:              { type: string, not_empty: true }
    size_note:             { type: string, not_empty: false }   # can be empty
    price:                 { type: string, not_empty: true }
    variants_count:        { type: integer, min: 0 }
    tags:                  { type: list }
    fetched_at:            { type: string, not_empty: true }
    description_raw:       { type: string, not_empty: false, max_chars: 2000 }
  optional_fields:
    special_feature:  { type: string, not_empty: false }
    fallback_flags:
      type: object
      fields:
        fabric_empty:   { type: boolean }
        age_empty:      { type: boolean }
        feature_empty:  { type: boolean }
        gift_unknown:   { type: boolean }
    variant_count:    { type: integer, min: 0 }
    has_reviews:      { type: boolean }
    has_stock_data:   { type: boolean }

# ── Stage 02b: Clothing Thinking Agent ───────────────────────────────────────
thinking:
  output_format: yaml_code_block       # must be inside ```yaml ... ```
  required_fields:
    product_id:             { type: string, not_empty: true }
    core_angle:             { type: string, not_empty: true }
    primary_parent_outcome: { type: string, not_empty: true }
    emotional_trigger:      { type: string, not_empty: false }
    main_friction:          { type: string, not_empty: false }
    message_budget:
      type: object
      required_sections: [hero, fabric_body, fabric_body_2, whats_special, benefits, emotional_reassurance, care, faq]
      each_section_requires:
        owns:    { type: string, not_empty: true, valid_values: [softness_skin, washing_durability, warmth_winter, ease_dressing, special_feature, parent_ease, gift_value] }
        message: { type: string, not_empty: true }
        forbidden: { type: list, min_count: 1 }
    cluster_map:            { type: object, not_empty: true }
    repetition_risks:       { type: list }   # can be empty list
  validation_rules:
    - "owns value must not appear in the same section's forbidden list"
    - "cluster_map must reference every cluster used in any owns field"
    - "benefits section must define card_1 through card_N (N = 4 or 6) each with owns + message"
    - "care section must define at least 3 card entries each with owns + message"
    - "faq section must define q1 through q4 each with topic + cluster"
    - "forbidden lists must not be empty — every section must declare at least 1 forbidden cluster"

# ── Stage 2: Fabric Story ─────────────────────────────────────────────────────
fabric_story:
  output_format: freeform_text
  section_key: fabric_story
  required_fields:
    title:
      type: string
      not_empty: true
      max_words: 6
    body:
      type: string
      not_empty: true
      max_sentences: 2
  optional_fields:
    body_2:
      type: string
      max_sentences: 1
    highlight_quote:
      type: string
    tags:
      type: pipe_separated_list     # "[tag1] | [tag2] | [tag3]"
      min_count: 1
      max_count: 4
  parse_pattern: |
    title: {title}
    body: {body}
    body_2: {body_2}
    highlight_quote: {highlight_quote}
    tags: {tags}

# ── Stage 3: Benefits ─────────────────────────────────────────────────────────
benefits:
  output_format: freeform_list
  section_key: benefits
  item_format: "- {emoji} | {title} | {description}"
  separator: "|"
  parts_per_item: 3
  part_names: [icon, title, description]
  constraints:
    count:
      min: 4
      max: 6
    title:
      max_words: 4
      unique: true             # no two benefits with same title
    description:
      max_sentences: 1
      not_empty: true

# ── Stage 4: FAQ ─────────────────────────────────────────────────────────────
faq:
  output_format: freeform_qa
  section_key: faq
  question_prefix: "Q:"
  answer_prefix: "A:"
  part_names: [question, answer]
  constraints:
    count:
      min: 3
      max: 4
    answer:
      max_sentences: 2
      not_empty: true
    question:
      ends_with: "?"
      not_empty: true

# ── Stage 5: Care Instructions ────────────────────────────────────────────────
care_instructions:
  output_format: freeform_list
  section_key: care_instructions
  item_format: "- {icon_type} | {card_title} | {card_text}"
  separator: "|"
  parts_per_item: 3
  part_names: [icon_type, card_title, card_text]
  constraints:
    count:
      min: 3
      max: 5
    icon_type:
      type: enum
      values: [wash_60, sun_dry, iron, no_bleach, repeat, no_tumble_dry, hand_wash]
    card_title:
      not_empty: true
    card_text:
      not_empty: true

# ── Stage 6: Validator ────────────────────────────────────────────────────────
validator:
  output_format: status_text
  pass_token: "STATUS: PASS"
  fail_token: "STATUS: FAIL"
  destination_token: "destination: metafields"
  error_line_prefix: "✗"
  # When FAIL, validator may include corrected versions of sections
  # using the same format as the original stage output.
  corrections_section_keys:
    - fabric_story
    - whats_special
    - benefits
    - emotional_reassurance
    - faq
    - care_instructions

# ── Stage 8: Page Validator ──────────────────────────────────────────────────
page_validator:
  output_format: json_code_block        # must be inside ```json ... ```
  pass_token: '"page_validation_status": "PASS"'
  fail_token: '"page_validation_status": "FAIL"'
  required_fields:
    product_id:                { type: string, not_empty: true }
    page_validation_status:    { type: enum, values: [PASS, FAIL] }
    publish_recommendation:    { type: enum, values: [publish, review, block] }
    overall_page_quality_score: { type: integer, min: 0, max: 100 }
    hebrew_summary:            { type: string, not_empty: true }
    section_scores:            { type: object }
    critical_failures:         { type: list }
    warnings:                  { type: list }
    cross_section_repetition:  { type: list }
    weak_benefits:             { type: list }
    care_duplications:         { type: list }
    generic_faq_items:         { type: list }
    hero_consistency_result:   { type: object }
  # page_validation_status = FAIL → orchestrator blocks push.
  # File absent (legacy products) → orchestrator skips check (backward-compatible).
  backward_compatible: true

# ── Stage 7: Publisher ────────────────────────────────────────────────────────
publisher:
  output_format: json_code_block       # must be inside ```json ... ```
  required_fields:
    product_id:            { type: string, not_empty: true }
    product_handle:        { type: string, not_empty: true }
    product_template_type: { type: enum, values: [clothing, shoes, accessories] }
    template_action:       { type: enum, values: [set_suffix_clothing, no_change, protected_abort] }
    body_html_clear:       { type: boolean }
    metafields:
      type: object
      required_keys:
        hero_eyebrow:          { type: string }
        hero_headline:         { type: string, not_empty: true }
        hero_subheadline:      { type: string }
        fabric_title:          { type: string, not_empty: true }
        fabric_body:           { type: string, not_empty: true }
        fabric_body_2:         { type: string }           # can be empty
        fabric_highlight:      { type: string }
        fabric_tags:           { type: list, min_count: 1 }
        whats_special:         { type: string, not_empty: true }
        benefits:              { type: list, item_fields: [icon, title, description], min_count: 4, max_count: 6 }
        emotional_reassurance: { type: string, not_empty: true }
        size_note:             { type: string }           # can be empty
        care_section_title:    { type: string }           # static label; can be empty for legacy products
        care_instructions:     { type: list, item_fields: [icon_type, card_title, card_text], min_count: 3, max_count: 5 }
        faq:                   { type: list, item_fields: [question, answer], min_count: 3, max_count: 4 }

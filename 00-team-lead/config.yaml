# ─────────────────────────────────────────────────────────────────────────────
# BabyMania Team Lead — Pipeline Configuration v2.0
# Single source of truth for all orchestration parameters.
# ─────────────────────────────────────────────────────────────────────────────

pipeline:
  version: "2.0"
  batch_size: 5
  preview_mode: false

# ── Agent Execution Order ─────────────────────────────────────────────────────
agents:
  order:
    - analyzer           # stage 1   — serial
    - clothing_thinking  # stage 1.5 — serial (message budget before all writers)
    - fabric_story       # stage 2   — parallel ↓
    - benefits           # stage 3   — parallel ↓
    - faq                # stage 4   — parallel ↓
    - care               # stage 5   — parallel ↓  (stages 2–5 run together)
    - validator       # stage 6  — serial
    - publisher       # stage 7  — serial (PUT metafields + assign template_suffix)
    - page_validator  # stage 8  — serial (page-level cross-section validation; blocks push if FAIL)
    # Future (not wired yet):
    # - seo_aeo_builder   # stage 9
    # - taxonomy_tags     # stage 10

  models:
    analyzer:            claude-opus-4-6
    clothing_thinking:   claude-opus-4-6
    fabric_story:        claude-sonnet-4-6
    benefits:     claude-sonnet-4-6
    faq:          claude-sonnet-4-6
    care:         claude-sonnet-4-6
    validator:      claude-opus-4-6
    publisher:      claude-opus-4-6
    page_validator: claude-opus-4-6

  agent_files:
    analyzer:          01-product-analyzer.md
    clothing_thinking: 02b-clothing-thinking.md
    fabric_story:      02-fabric-story-writer.md
    benefits:       03-benefits-generator.md
    faq:            04-faq-builder.md
    care:           05-care-instructions.md
    validator:      06-validator.md
    publisher:      07-shopify-publisher.md
    page_validator: 09-page-validator.md

  prompt_files:
    fabric_story: fabric-story.md
    benefits:     benefits.md
    faq:          faq.md
    care:         care.md

# ── Timeouts (seconds) ───────────────────────────────────────────────────────
timeouts:
  analyzer:          30
  clothing_thinking: 30
  fabric_story:      60
  benefits:     60
  faq:          60
  care:         60
  validator:      20
  publisher:      30
  page_validator: 45
  verification:   10

# ── Retry Rules ───────────────────────────────────────────────────────────────
retry:
  analyzer:
    max_attempts: 2
    on: [timeout, empty_output]
  writers:
    max_attempts: 1        # single retry, only triggered by validator_fail
    on: [validator_fail]
  validator:
    max_attempts: 1        # re-validate once after writers retry
  publisher:
    max_attempts: 2
    on: [timeout, shopify_error]

# ── State Machine ─────────────────────────────────────────────────────────────
states:
  all:
    - created
    - analyzed
    - sections_generated
    - validated
    - published
    - failed

  terminal:
    - published
    - failed

  # Legal forward transitions only.
  # Any stage failure → "failed" (not shown per-transition).
  transitions:
    created:            analyzed
    analyzed:           sections_generated
    sections_generated: validated
    validated:          published

# ── Content Rules ─────────────────────────────────────────────────────────────
content_rules:

  # Words that are FORBIDDEN unless found literally in description_raw or fabric_type.
  # Validator must FAIL if these appear in generated content without a source.
  blocked_if_not_in_source:
    - word: "סרבל"
      allowed_when: "product_type contains 'סרבל'"
    - word: "100% כותנה"
      allowed_when: "fabric_type contains '100% כותנה'"
    - word: "כותנה סרוגה"
      allowed_when: "fabric_type contains 'כותנה סרוגה'"
    - word: "כותנה"
      allowed_when: "fabric_type is not empty"
    - word: "פוליאסטר"
      allowed_when: "fabric_type is not empty"
    - word: "סריג"
      allowed_when: "fabric_type contains 'סריג'"
    - word: "ג'רסי"
      allowed_when: "fabric_type contains \"ג'רסי\""

  # Words always discouraged regardless of source — brand voice violations.
  # Validator should FAIL if these appear anywhere in generated content.
  always_discouraged_brand_voice:
    - "מושלם"
    - "הכי טוב"
    - "איכות גבוהה"
    - "מדהים"
    - "חובה לכל אמא"
    - "פרימיום במיוחד"
    - "תינוקכם"
    - "מעוצב בקפידה"
    - "נבחר בקפידה"
    - "מביא לכם את הטוב ביותר"

# ── Care Icon Constraints ──────────────────────────────────────────────────────
care_icons:
  allowed:
    - wash_60
    - sun_dry
    - iron
    - no_bleach
    - repeat
    - no_tumble_dry
    - hand_wash
  when_fabric_unknown: hand_wash   # if fabric_type is empty → no wash_60

# ── Publish Verification ──────────────────────────────────────────────────────
publish_verification:
  check_metafields_written: true   # GET /metafields?namespace=baby_mania → all 14 keys present
  check_body_html_empty:    true   # product.body_html == "" or null

# ── Required Metafields ────────────────────────────────────────────────────────
required_metafields:
  namespace: baby_mania
  required_keys:
    - hero_eyebrow
    - hero_headline
    - hero_subheadline
    - fabric_title
    - fabric_body
    - fabric_highlight
    - fabric_tags
    - whats_special
    - benefits
    - emotional_reassurance
    - care_instructions
    - faq
  optional_keys:
    - fabric_body_2       # may be empty
    - care_section_title  # from stage-05; static label for care accordion
    - size_note           # may be empty

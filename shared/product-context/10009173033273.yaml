  עיצוב יוניסקס – מתאים לבנים ולבנות



  שרוול ארוך – שמירה על חום הגוף בחורף



  צווארון V סרוג – מראה אלגנטי ונעים


  מידות מדויקות – לפי טבלת גובה ומשקל

